# =============================================================================
# ansible.cfg — Configuration Ansible globale pour le webinar
# =============================================================================
# Ce fichier configure le comportement global d'Ansible pour ce projet.
# Dans Ansible Automation Platform, certains paramètres sont gérés par l'UI.
# =============================================================================

[defaults]
# Inventaire par défaut (peut être surchargé avec -i)
inventory = inventories/dev/hosts.yml

# Dossier des rôles
roles_path = roles

# Nombre de tâches parallèles (forks)
forks = 10

# Timeout de connexion en secondes
timeout = 30

# Désactiver la vérification des clés SSH hôtes (lab uniquement)
# En production : host_key_checking = True
host_key_checking = False

# Affichage des diffs pour les modules qui le supportent
diff = False

# Format de callback pour des sorties plus lisibles
stdout_callback = yaml
callbacks_enabled = timer, profile_tasks

# Chemin vers les collections installées
collections_path = ~/.ansible/collections:/usr/share/ansible/collections

# Journalisation (désactivée par défaut — activer pour le debug)
# log_path = /var/log/ansible/ansible.log

# Retry files (désactivé pour un repo propre)
retry_files_enabled = False

[privilege_escalation]
# Windows n'utilise pas become de la même façon que Linux
# L'élévation de privilèges est gérée via WinRM et les credentials
become = False
become_method = runas
become_user = SYSTEM

[winrm]
# Timeout WinRM en secondes
operation_timeout_sec = 60
read_timeout_sec = 70

[ssh_connection]
# Options SSH (non utilisées pour Windows mais présentes pour référence)
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
