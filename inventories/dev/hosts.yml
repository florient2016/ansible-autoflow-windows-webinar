# =============================================================================
# inventories/dev/hosts.yml — Inventaire de l'environnement de développement
# =============================================================================
# IMPORTANT : Cet inventaire est fourni à titre d'exemple uniquement.
#
# En production avec Ansible Automation Platform :
# - Utilisez les Inventaires AAP (gérés dans l'UI Controller)
# - Les credentials (ansible_user, ansible_password) sont gérés
#   par les Credentials AAP et NE DOIVENT PAS figurer ici
# - Cet inventaire peut servir pour les tests locaux uniquement
# =============================================================================

---
all:
  children:
    windows:
      hosts:
        # ---------------------------------------------------------------
        # Remplacez par l'IP ou le FQDN réel de votre serveur Windows
        # ---------------------------------------------------------------
        windows-server-01:
          ansible_host: 192.168.1.100    # ← Modifier avec votre IP

        # Exemple avec un second serveur (commenter si non utilisé)
        # windows-server-02:
        #   ansible_host: 192.168.1.101

      vars:
        # -------------------------------------------------------------------
        # Variables de connexion WinRM
        # NOTE : ansible_user et ansible_password ne doivent PAS être
        # stockés ici en production — utilisez les Credentials AAP.
        # Ces lignes sont commentées intentionnellement.
        # -------------------------------------------------------------------
        # ansible_user: Administrator        # ← Géré par AAP Credentials
        # ansible_password: "VotreMdp"       # ← JAMAIS en clair dans git !

        # Protocole de connexion — WinRM pour Windows
        ansible_connection: winrm

        # Transport WinRM
        # Options : basic, ntlm, kerberos, credssp, certificate
        # - basic      : HTTP simple — lab uniquement, non sécurisé
        # - ntlm       : Authentification Windows — recommandé pour les labs
        # - kerberos   : Active Directory — recommandé en production
        ansible_winrm_transport: ntlm

        # Port WinRM
        # - 5985 : HTTP (non chiffré — lab uniquement)
        # - 5986 : HTTPS (chiffré — production)
        ansible_winrm_port: 5985

        # Schéma de connexion
        ansible_winrm_scheme: http         # Utiliser https en production

        # Validation du certificat HTTPS
        # Mettre à 'validate' en production avec un certificat valide
        ansible_winrm_server_cert_validation: ignore

        # Shell par défaut sur Windows
        ansible_shell_type: powershell

        # Version PowerShell minimale requise
        # ansible_powershell_min_version: 5.1
