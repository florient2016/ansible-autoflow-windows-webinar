# ---------------------------------------------------------------------------
# ÉTAPE 10 : Vérification que le site web répond correctement
# Test HTTP local depuis le serveur Windows pour valider le déploiement.
# win_uri est l'équivalent Windows du module uri.
# ---------------------------------------------------------------------------
- name: "🔍 [IIS] Vérifier que le site web répond"
  ansible.windows.win_uri:
    url: "http://{{ inventory_hostname }}:{{ iis_site_port }}"
    method: GET
    status_code: 200
    return_content: true
    timeout: 30
  register: http_check
  retries: 5        # Retry car IIS peut mettre quelques secondes à démarrer
  delay: 5
  until: http_check.status_code is defined and http_check.status_code == 200

- name: "✅ [IIS] Le site web répond correctement"
  ansible.builtin.debug:
    msg:
      - "URL testée    : http://{{ inventory_hostname }}:{{ iis_site_port }}"
      - "Code HTTP     : {{ http_check.status_code }}"
      - "Contenu reçu  : {{ http_check.content | truncate(100) }}"
